databases:
  - name: habitchain-db
    plan: free

services:
  - type: web
    name: habitchain-api
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: habitchain-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
